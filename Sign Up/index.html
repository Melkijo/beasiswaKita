<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeasiswaKita - Sign Up</title>
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <!-- Column Section -->
    <div class="container-fluid d-inline-block">
      <div class="row align-items-start">
        <div class="col-6">
          <img
            src="img/pexels-armin-rimoldi-5553118 1.png"
            class="rounded float-start"
            style="width: 100%"
            alt="..."
          />
        </div>
        <Pemerataan class="col-6 ">
          <img
            src="img/logo.png"
            class="rounded float-start mt-5"
          />
          <p class="mt-xl-5 text-muted">
            <br><br>
          Pemerataan Informasi Beasiswa
        </p>
          <!-- Form Section -->
          <form class="mt-4">
            <div class="mb-3">
              <label for="InputNama1" class="form-label">Nama Lengkap</label>
              <input
                type="nama"
                class="form-control bg-light"
                id="InputNama1"
                placeholder="Nama"
              />
            </div>
            <div class="mb-3">
              <label for="InputEmail1" class="form-label">Email</label>
              <input
                type="email"
                class="form-control bg-light"
                id="InputEmail1"
                placeholder="Email"
              />
            </div>
            <div class="mb-3">
              <label for="InputPassword1" class="form-label"
                >Kata Sandi</label
              >
              <input
                type="password"
                class="form-control bg-light"
                id="InputPassword1"
                placeholder="kata sandi"
              />
            </div>
            <div class="row mb-3">
              <div class="col">
                <label for="InputPassword1" class="form-label"
                  >Pendidikan</label
                >
                <input
                  type="text"
                  class="form-control bg-light"
                  placeholder="Pendidikan"
                  aria-label="First name"
                />
              </div>
              <div class="col">
                <label for="InputPassword1" class="form-label"
                  >Minat</label
                >
                <input
                  type="text"
                  class="form-control bg-light"
                  placeholder="Minat"
                  aria-label="Last name"
                />
              </div>
            </div>

            <div class="mb-3 form-check">
              <input
                type="checkbox"
                class="form-check-input"
                id="Check1"
              />
              <label class="form-check-label" for="Check1"
                >Setuju kebijakan</label
              >
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">Submit</button>
            </div>
          </form>
          <!-- End Form Section -->
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"
      integrity="sha384-Xe+8cL9oJa6tN/veChSP7q+mnSPaj5Bcu9mPX5F5xIGE0DVittaqT5lorf0EI7Vk"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.min.js"
      integrity="sha384-kjU+l4N0Yf4ZOJErLsIcvOU2qSb74wXpOhqTvwVx3OElZRweTnQ6d31fXEoRD1Jy"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </body>
</html>
